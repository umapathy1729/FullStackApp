
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        image: your-aws-account-id.dkr.ecr.ap-south-1.amazonaws.com/fullstack-frontend:latest
        ports:
        - containerPort: 80  
